          <script>
               //Al cargarse la página---------------------------------------------------------------------------
               //Control de seguridad en la apertura de la página------------------------------------------------
               var nom = localStorage.getItem("nomUsuario");
               if (nom == "" || nom == null){
                    window.location.href = "error.html"; // Redirige al login
               }
               //Fin del Control de seguridad en la apertura de la página----------------------------------------
               
               //------------------------------------------------------------------------------------------------
               // 1. SIMULACIÓN DE BASE DE DATOS CON LOCALSTORAGE
               // Recuperar el array de objetos 'usuarios' desde localStorage. 
               // Si no existe (es null), usamos un array vacío [] gracias al operador lógico ||
               var usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];

               let tabla;
               // 2. INSTANCIAS DE COMPONENTES BOOTSTRAP
               // Inicializamos los modales de Bootstrap en variables para poder abrirlos (show) y cerrarlos (hide) desde JavaScript
               const modalNUsuario = new bootstrap.Modal(document.getElementById('modalNuevoUsuario'));

               document.addEventListener('DOMContentLoaded', function () {
                    // Llamada a la función que inyecta el menú (ubicada en js/funcionesSistema.js)
                    // Esto evita tener que copiar y pegar todo el HTML del menú en cada página.
                    cargarComponentes();
                    cargarTablaUsuarios();

                    //Evento para Nuevo Usuario----------------------------------------------------------
                    // 3. CAPTURAR EL ENVÍO DEL FORMULARIO (SUBMIT)
                    document.getElementById('formNuevoUsuario').addEventListener('submit', function (e) {
                         // Usamos preventDefault() para evitar que la página se recargue (comportamiento por defecto de los formularios)
                         e.preventDefault();

                         const pass = document.getElementById('contrasena').value;
                         const confirmPass = document.getElementById('confirmar_contrasena').value;
                         const rolSeleccionado = document.getElementById('selRol').value;

                         if(pass !== confirmPass){
                              alertify.error("Las Contraseñsa no coinciden");
                              return;
                         }

                         const regexSegura = /^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{8,}$/;
                         if (!regexSegura.test(pass)) {
                         alertify.warning("La contraseña debe tener al menos 8 caracteres, incluyendo letras y números");
                         return;
                         }

                         const nuevoUsuario = {
                              idusuario: obtenerSiguienteId(usuarios),
                              cedula: document.getElementById('cedula').value.trim(),
                              nombre: document.getElementById('nombre').value.trim().toUpperCase(),
                              celular: document.getElementById('celular').value.trim(),
                              usuario: document.getElementById('txtusuario').value.trim(),
                              contrasena: pass,
                              rol: rolSeleccionado
                         };

                         if (Object.values(nuevoUsuario).some(val => val === '')) {
                              alert('Todos los campos son obligatorios');
                              return;
                         }

                         usuarios.push(nuevoUsuario);
                         guardarUsuarios(usuarios);
                         tabla.clear().rows.add(usuarios).draw();
                         tabla.column(5).visible(false);
                         this.reset();
                         //tabla.row.add(nuevoUsuario).draw();
                         modalNUsuario.hide();
                         alertify.success("Registro guardado");
                    });

                 
                    const modalEUsuario = new bootstrap.Modal(document.getElementById('modalEditarUsuario'));
                    // Evento para botón editar--------------------------------------------------------------
                    // 4. DELEGACIÓN DE EVENTOS (EVENT DELEGATION)
                    // Como los botones de "Editar" y "Eliminar" son creados dinámicamente por el DataTable, no podemos asignarles 
                    // un EventListener directo al cargar la página. Por eso, escuchamos los clics en TODO el 'document' y 
                    // verificamos si el elemento clickeado (e.target) corresponde a nuestro botón.
                    document.addEventListener('click', function (e) {
                         if (e.target.closest('.btn-editar')) {
                              const id = parseInt(e.target.closest('.btn-editar').dataset.id);
                              const usuario = usuarios.find(u => u.idusuario === id);
                              
                              if (usuario) {
                                   // 1. Obtener el rol del usuario que inició sesión
                                   const rolActual = localStorage.getItem("rolUsuario");

                                   // 2. Cargar los datos en el modal
                                   document.getElementById('edit_idusuario').value = usuario.idusuario;
                                   document.getElementById('edit_cedula').value = usuario.cedula;
                                   document.getElementById('edit_nombre').value = usuario.nombre;
                                   document.getElementById('edit_celular').value = usuario.celular;
                                   document.getElementById('edit_usuario').value = usuario.usuario;
                                   document.getElementById('edit_contrasena').value = usuario.contrasena;
                                   
                                   // Si tienes un campo para el rol en tu modal, lo cargamos
                                   const campoRol = document.getElementById('edit_rol');
                                   if(campoRol) campoRol.value = usuario.rol;

                                   // 3. APLICAR RESTRICCIONES DE SEGURIDAD
                                   if (rolActual !== "Administrador") {
                                        // Bloquear campos para que el usuario normal solo los vea, pero no los edite
                                        document.getElementById('edit_cedula').readOnly = true;
                                        document.getElementById('edit_nombre').readOnly = true;
                                        document.getElementById('edit_celular').readOnly = true;
                                        
                                        // Los <select> se bloquean con disabled, no con readOnly
                                        if(campoRol) campoRol.disabled = true; 
                                        
                                        // Garantizar que usuario y contraseña estén desbloqueados
                                        document.getElementById('edit_usuario').readOnly = false;
                                        document.getElementById('edit_contrasena').readOnly = false;
                                   } else {
                                        // Si es Administrador, asegurarse de que todo esté desbloqueado 
                                        // (por si acaso el modal se quedó bloqueado de una edición anterior)
                                        document.getElementById('edit_cedula').readOnly = false;
                                        document.getElementById('edit_nombre').readOnly = false;
                                        document.getElementById('edit_celular').readOnly = false;
                                        if(campoRol) campoRol.disabled = false;
                                        
                                        document.getElementById('edit_usuario').readOnly = false;
                                        document.getElementById('edit_contrasena').readOnly = false;
                                   }

                                   // 4. Mostrar el modal
                                   modalEUsuario.show();
                              }
                         }
                         });

                    // Guardar cambios al editar-----------------------------------------------------------
                     document.getElementById('formEditarUsuario').addEventListener('submit', function (e) {
                    e.preventDefault();
                    
                    const id = parseInt(document.getElementById('edit_idusuario').value);
                    const index = usuarios.findIndex(u => u.idusuario === id);
                    
                    if (index !== -1) {
                         // --- IMPORTANTE: Capturamos el login que tenía el usuario antes de editarlo ---
                         const usuarioViejo = usuarios[index].usuario; 
                         const loginSesionActual = localStorage.getItem("userLogin");
                         
                         // Capturamos los nuevos valores del formulario
                         const nuevoNombre = document.getElementById('edit_nombre').value.trim().toUpperCase();
                         const nuevoLogin = document.getElementById('edit_usuario').value.trim();
                         const nuevaContrasena = document.getElementById('edit_contrasena').value.trim();

                         // Actualizamos el objeto en el array (incluyendo el ROL que ya tenía)
                         usuarios[index] = {
                              ...usuarios[index], // Mantiene campos que no están en el form como el 'rol'
                              cedula: document.getElementById('edit_cedula').value.trim(),
                              nombre: nuevoNombre,
                              celular: document.getElementById('edit_celular').value.trim(),
                              usuario: nuevoLogin,
                              contrasena: nuevaContrasena
                         };

                         // Si el usuario que está logueado se editó a sí mismo, actualizamos su sesión
                         if (loginSesionActual === usuarioViejo) {
                              localStorage.setItem("userLogin", nuevoLogin);
                              localStorage.setItem("nomUsuario", nuevoNombre);
                              
                              // Opcional: Actualizar el nombre en el sidebar/navbar sin recargar
                              const txtNombre = document.getElementById('txtNombreUsuario');
                              if (txtNombre) txtNombre.innerText = nuevoNombre;
                         }

                         // --- PERSISTENCIA Y REFRESCO ---
                         guardarUsuarios(usuarios);
                         
                         // Si usas filtrado para no-administradores, recuerda volver a filtrar aquí
                         const rolActual = localStorage.getItem("rolUsuario");
                         if (rolActual !== "Administrador") {
                              const misDatos = usuarios.filter(u => u.usuario === nuevoLogin);
                              tabla.clear().rows.add(misDatos).draw();
                         } else {
                              tabla.clear().rows.add(usuarios).draw();
                         }

                         // --- CIERRE Y ALERTA ---
                         modalEUsuario.hide();
                         
                         // Forzamos la alerta antes de cualquier otra acción
                         alertify.success("¡Excelente! Usuario actualizado correctamente.");
                    } else {
                         alertify.error("Error: No se encontró el usuario.");
                    }
                    });

                    const modalDelUsuario = new bootstrap.Modal(document.getElementById('modalEliminarUsuario'));

                    // Evento para botón eliminar (Abre el modal)
                    document.addEventListener('click', function (e) {
                         if (e.target.closest('.btn-eliminar')) {
                              const id = parseInt(e.target.closest('.btn-eliminar').dataset.id);
                              const usuario = usuarios.find(u => u.idusuario === id);
                              if (usuario) {
                                   document.getElementById('del_idusuario').value = usuario.idusuario;
                                   document.getElementById('del_cedula').textContent = usuario.cedula;
                                   document.getElementById('del_nombre').textContent = usuario.nombre;
                                   document.getElementById('del_celular').textContent = usuario.celular;
                                   document.getElementById('del_usuario').textContent = usuario.usuario;
                                   modalDelUsuario.show();
                              }
                         }
                    });

                    // Evento para el botón eliminar dentro del modal (Ejecuta Alertify)
                    document.getElementById('btnConfirmarEliminar').addEventListener('click', function() {
                         const id = parseInt(document.getElementById('del_idusuario').value);
                         alertify.confirm("Eliminar usuario", "¿Realmente deseas eliminar de forma permanente a este usuario?",
                              function(){
                                   usuarios = usuarios.filter(u => u.idusuario !== id);
                                   guardarUsuarios(usuarios);
                                   tabla.clear().rows.add(usuarios).draw();
                                   modalDelUsuario.hide();
                                   alertify.success("Usuario eliminado correctamente");
                              },
                              function(){
                                   modalDelUsuario.hide();
                                   alertify.error("Eliminación cancelada");
                              }
                         ).set('labels', {ok:'Sí, eliminar', cancel:'No, mantener'});
                    });
               });
               //------------------------------------------------------------------------------
               function cargarTablaUsuarios(){
                    //Necesarios para filtrar
                    const rolActual = localStorage.getItem("rolUsuario");
                    const loginActual = localStorage.getItem("userLogin");
                    const usuariosData = JSON.parse(localStorage.getItem('usuarios')) || [];

                    // 1. Si no es Admin, filtramos para que solo vea SU PROPIO registro
                    let datosFiltrados = usuariosData;
                    if (rolActual !== "Administrador") {
                         datosFiltrados = usuariosData.filter(u => u.usuario === loginActual);
                         // Ocultamos el botón "Nuevo usuario"
                         $('#btnNuevoUsuario').hide(); 
                    }
                    // Inicializar el DataTable
                    tabla = new DataTable("#tabla_usuarios", {
                         data: usuarios,
                         columns: [
                              { data: 'idusuario', title: 'Id Usuario' },
                              { data: 'cedula', title: 'N° Cédula' },
                              { data: 'nombre', title: 'Nombre' },
                              { data: 'celular', title: 'Celular' },
                              { data: 'usuario', title: 'Usuario' },
                              { data: 'contrasena', title: 'Contraseña' },
                              {data: 'rol', title: 'Rol'},
                              {
                                   data: null,
                                   render: function (data, type, row) {
                                   return `
                                        <button class="btn btn-sm btn-warning me-1 btn-editar" data-id="${row.idusuario}"><i class="bi bi-pencil-square"></i></button>
                                        <button class="btn btn-sm btn-danger btn-eliminar" data-id="${row.idusuario}"><i class="bi bi-trash"></i></button>
                                   `;
                                   }
                              }
                         ],
                         dom: 'Bfrtip',
                         buttons: [
                              {
                                   extend: 'excelHtml5',
                                   text: '<i class="bi bi-filetype-xlsx"></i> Exportar a Excel',
                                    title: 'PUNTO ELEGANCIA - REPORTE USUARIOS',
                                   filename: 'Punto_Elegancia_Articulos',
                                   exportOptions: { columns: [0, 1, 2, 3, 4, 5, 6] }

                              },
                              {
                                   extend: 'pdfHtml5',
                                   text: '<i class="bi bi-filetype-pdf"></i> Exportar a PDF',
                                   orientation: 'landscape',
                                   pageSize:'A4',
                                   title: '', //aqui ira el membrete
                                   exportOptions: {
                                        columns: [0, 1, 2, 3, 4, 6] // Excluye columna de acciones (índice 6)
                                   },
                                   customize: function (doc) {
                                   // --- MEMBRETE Y LOGO ---
                                   // doc.content[0] es el título, lo reemplazamos por un diseño profesional
                                   doc.content.splice(0, 0, {
                                        margin: [0, 0, 0, 12],
                                        table: {
                                        widths: [80, '*', 'auto'],
                                        body: [
                                             [
                                                  // Aquí iría tu logo en Base64 (puedes dejarlo vacío o poner texto)
                                                  { text: 'PUNTO\nELEGANCIA', fontSize: 14, bold: true, color: '#4e73df', alignment: 'center' },
                                                  {
                                                       stack: [
                                                            { text: 'REPORTE DE USUARIOS', fontSize: 16, bold: true },
                                                            { text: 'Venta de Ropa y Accesorios', fontSize: 10, color: '#666' },
                                                            { text: 'Belén, Concepción - Paraguay', fontSize: 10, color: '#666' }
                                                       ],
                                                       alignment: 'left',
                                                       margin: [10, 0, 0, 0]
                                                  },
                                                  {
                                                       stack: [
                                                            { text: 'INFORME DE ARTÍCULOS', fontSize: 12, bold: true, alignment: 'right' },
                                                            { text: 'Fecha: ' + new Date().toLocaleDateString(), fontSize: 10, alignment: 'right' },
                                                            { text: 'Hora: ' + new Date().toLocaleTimeString(), fontSize: 10, alignment: 'right' }
                                                       ]
                                                  }
                                             ]
                                        ]
                                        },
                                        layout: 'noBorders'
                                   });
                                   }
                               }, //Fin de pdf
                              {
                                   text: '<i class="bi bi-file-earmark-plus"></i> Nuevo usuario',
                                   className: 'btn btn-sm btn-primary',
                                   action: function (e, dt, node, config) {
                                        // Abrir un modal para crear un nuevo usuario
                                        $('#modalNuevoUsuario').modal('show');
                                   }
                              }
                         ],
                         responsive: true,
                         language: spanish,
                         initComplete: function () {
                              // Aplicar clases de Bootstrap a los botones
                              $('.dt-button:contains("Nuevo usuario")')
                                   .removeClass('dt-button') // elimina estilo por defecto
                                   .addClass('btn btn-sm btn-primary'); // agrega estilos Bootstrap

                              $('.dt-button:contains("Imprimir")')
                                   .removeClass('dt-button')
                                   .addClass('btn btn-sm btn-info');

                              $('.dt-button:contains("Exportar a Excel")')
                                   .removeClass('dt-button')
                                   .addClass('btn btn-sm btn-success');

                              $('.dt-button:contains("Exportar a PDF")')
                                   .removeClass('dt-button')
                                   .addClass('btn btn-sm btn-danger');
                         }
                    });
                    tabla.column(5).visible(false); //Ocultar la columna contraseña
               }
               //------------------------------------------------------------------------------
               function guardarUsuarios(data) {
                    localStorage.setItem('usuarios', JSON.stringify(data));
               }
               //------------------------------------------------------------------------------
               function obtenerSiguienteId(usuarios) {
                    if (usuarios.length === 0){
                         return 1;
                    }else{
                         const maxId = Math.max(...usuarios.map(u => u.idusuario || 0));
                         return maxId + 1;
                    }
               }
               //------------------------------------------------------------------------------
          </script>
