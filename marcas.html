<body class="sb-nav-fixed">

            <div id="layoutSidenav_content">
                        <!-- AQUÍ VA TODO LO QUE SE VA A VISUALIZAR EN LA PÁGINA -->
                        <!-- CUERPO DEL DASHBOARD -->
                <main>
                        <div class="container-fluid px-4">

    <!-- nueva marca modal -->
    <div class="modal fade" id="modalNuevaMarca" tabindex="-1"
    aria-labelledby="modalMarcaLabel" aria-hidden="true" data-bs-backdrop="static">
        <div class="modal-dialog">
            <form id="formNuevaMarca" class="modal-content">
                <div class="modal-header bg-primary text-white">
                        <h5 class="modal-title" id="modalMarcaLabel">
                            <i class="bi bi-person-plus-fill"></i> Agregar Nueva Marca</h5>
                        <button type="button" class="btn-close btn-close-white" 
                        data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>
                <div class="modal-body">
                        
                        <div class="mb-3">
                            <label class="form-label">Marca</label>
                            <input type="text" id="marca" class="form-control text-uppercase" required minlength="4" maxlength="50">
                        </div>
                        
                </div>
                <div class="modal-footer">
                        <button type="reset" class="btn btn-secondary" data-bs-dismiss="modal"><i class="bi bi-x-circle"></i> Cancelar</button>
                        <button type="submit" class="btn btn-primary"><i class="bi bi-floppy"></i> Guardar Marca    </button>
                </div>
            </form>
        </div>
    </div>
    <!-- Modal Editar Marca -->
    <div class="modal fade" id="modalEditarMarca" tabindex="-1" aria-labelledby="modalEditarMarcaLabel" aria-hidden="true" data-bs-backdrop="static">
        <div class="modal-dialog">
            <form id="formEditarMarca" class="modal-content">   
                <div class="modal-header bg-warning text-dark">
                        <h5 class="modal-title" id="modalEditarMarcaLabel"><i class="bi bi-pencil-square"></i> Editar Marca</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>
                <div class="modal-body">
                        <input type="hidden" id="edit_idmarca">
                        <div class="mb-2">
                            <label class="form-label">Marca</label>
                            <input type="text" id="edit_marca" class="form-control text-uppercase" required minlength="4" maxlength="50">
                        </div>
                </div>
                <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal"><i class="bi bi-x-circle"></i> Cancelar</button>
                        <button type="submit" class="btn btn-warning"><i class="bi bi-floppy"></i> Guardar Cambios</button>
                </div>
            </form>
        </div>
    </div>
    <!-- Modal Eliminar Marca -->
<div class="modal fade" id="modalEliminarMarca" tabindex="-1"
aria-labelledby="modalEliminarMarcaLabel" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title" id="modalEliminarMarcaLabel">
                    <i class="bi bi-exclamation-triangle-fill"></i> Eliminar Marca</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Cerrar"></button>
            </div>
            <div class="modal-body">
                    <p class="text-center fw-bold">¿Deseas proceder con la eliminación?</p>
                    <input type="hidden" id="del_idmarca">
                    <ul class="list-group mb-3">
                        <li class="list-group-item"><strong>Marca:</strong> <span id="del_marca"></span></li>
                    </ul>
            </div>
            <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal"><i class="bi bi-x-circle"></i> Cancelar</button>
                    <button type="button" class="btn btn-danger" id="btnConfirmarEliminar"><i class="bi bi-trash"></i> Eliminar</button>
            </div>
        </div>
    </div>
</div>
    <script src="js/funcionesSistema.js"></script>
        <!-- MENU -->
        <script src="menu/bootstrap.bundle.min.js"></script>
        <script src="menu/scripts.js"></script>
        <!-- DATATABLES -->
        <script src="dt/jquery-3.7.1.js"></script>
        <script src="dt/datatables.min.js"></script>
        <script src="dt/jquery.dataTables.min.js"></script>
        <!-- DATATABLES Buttons extension -->
        <script src="dt/dataTables.buttons.min.js"></script>
        <script src="dt/buttons.print.min.js"></script>
        <script src="dt/buttons.html5.min.js"></script>
        <!-- DATATABLES JSZip y pdfmake para exportar -->
        <script src="dt/jszip.min.js"></script>
        <script src="dt/pdfmake.min.js"></script>
        <script src="dt/vfs_fonts.js"></script>
        <!-- DATATABLES Idioma Español -->
        <script src="dt/es-ES.js"></script>
        <script>
               //Al cargarse la página---------------------------------------------------------------------------
               //Control de seguridad en la apertura de la página------------------------------------------------
            var nom = localStorage.getItem("nomUsuario");
            if (nom == "" || nom == null){
                window.location.href = "error.html"; // Redirige al login
            }
            //Fin del Control de seguridad en la apertura de la página----------------------------------------
            
            //------------------------------------------------------------------------------------------------
            // 1. SIMULACIÓN DE BASE DE DATOS CON LOCALSTORAGE
            // Recuperar el array de objetos 'marcas' desde localStorage. 
            // Si no existe (es null), usamos un array vacío [] gracias al operador lógico ||
            var marcas= JSON.parse(localStorage.getItem("marcas")) || [];

            let tabla;
            // 2. INSTANCIAS DE COMPONENTES BOOTSTRAP
            // Inicializamos los modales de Bootstrap en variables para poder abrirlos (show) y cerrarlos (hide) desde JavaScript
            const modalNMarca = new bootstrap.Modal(document.getElementById('modalNuevaMarca'));

            document.addEventListener('DOMContentLoaded', function () {
                // Llamada a la función que inyecta el menú (ubicada en js/funcionesSistema.js)
                // Esto evita tener que copiar y pegar todo el HTML del menú en cada página.
                cargarComponentes();
                cargarTablaMarcas();

                //Evento para Nueva Marca----------------------------------------------------------
                // 3. CAPTURAR EL ENVÍO DEL FORMULARIO (SUBMIT)
                document.getElementById('formNuevaMarca').addEventListener('submit', function (e) {
                    e.preventDefault();
                    
                    const marcaInput = document.getElementById('marca').value.trim().toUpperCase();

                    if (marcaInput === '') {
                        alertify.error('El campo marca es obligatorio');
                        return;
                    }

                    // VALIDACIÓN: No permitir marcas duplicadas
                    if (marcas.some(m => m.marca.toUpperCase() === marcaInput)) {
                        alertify.error('Error: Esta marca ya se encuentra registrada.');
                        document.getElementById('marca').focus();
                        return;
                    }

                    const nuevaMarca = {
                        idmarca: obtenerSiguienteId(marcas),
                        marca: marcaInput
                    };

                    marcas.push(nuevaMarca);
                    guardarMarcas(marcas); // Llamamos a la función correcta
                    
                    this.reset();
                    if (tabla) {
                        tabla.clear().rows.add(marcas).draw();
                    }
                    modalNMarca.hide();
                    alertify.success('Marca registrada con éxito');
                });

                
                const modalEMarca = new bootstrap.Modal(document.getElementById('modalEditarMarca'));
                // Evento para botón editar--------------------------------------------------------------
                // 4. DELEGACIÓN DE EVENTOS (EVENT DELEGATION)
                // Como los botones de "Editar" y "Eliminar" son creados dinámicamente por el DataTable, no podemos asignarles 
                // un EventListener directo al cargar la página. Por eso, escuchamos los clics en TODO el 'document' y 
                // verificamos si el elemento clickeado (e.target) corresponde a nuestro botón.
                document.addEventListener('click', function (e) {
                        if (e.target.closest('.btn-editar')) {
                            const id = parseInt(e.target.closest('.btn-editar').dataset.id);
                            const marca = marcas.find(m => m.idmarca === id);
                            if (marca) {
                                document.getElementById('edit_idmarca').value = marca.idmarca;
                                document.getElementById('edit_marca').value = marca.marca;
                                modalEMarca.show();
                            }
                        }
                });

                // Guardar cambios al editar-----------------------------------------------------------
                document.getElementById('formEditarMarca').addEventListener('submit', function (e) {
                    e.preventDefault(); // Esto evita el parpadeo y el "?"
                    
                    const id = parseInt(document.getElementById('edit_idmarca').value);
                    const marcaInput = document.getElementById('edit_marca').value.trim().toUpperCase();
                    const index = marcas.findIndex(m => m.idmarca === id);

                    if (marcaInput === '') {
                        alertify.error('El campo marca no puede estar vacío');
                        return;
                    }

                    // VALIDACIÓN: No permitir duplicados (excluyendo la marca que estamos editando)
                    if (marcas.some(m => m.marca.toUpperCase() === marcaInput && m.idmarca !== id)) {
                        alertify.error('Error: Ya existe otra marca con ese nombre.');
                        document.getElementById('edit_marca').focus();
                        return;
                    }

                    if (index !== -1) { 
                        marcas[index].marca = marcaInput; 
                        guardarMarcas(marcas);
                        tabla.clear().rows.add(marcas).draw();
                        modalEMarca.hide();
                        alertify.success('Marca actualizada correctamente');
                    }
                });

                const modalDelMarca = new bootstrap.Modal(document.getElementById('modalEliminarMarca'));


                // --- EVENTO PARA ABRIR MODAL ELIMINAR ---

                document.addEventListener('click', function (e) {
                    if (e.target.closest('.btn-eliminar')) {
                        const id = parseInt(e.target.closest('.btn-eliminar').dataset.id);
                        const marca = marcas.find(m => m.idmarca === id);
                        
                        if (marca) {
                            document.getElementById('del_idmarca').value = id;
                            document.getElementById('del_marca').textContent = marca.marca;
                            modalDelMarca.show();
                        }
                    }
                });

                // --- EVENTO CONFIRMAR ELIMINACIÓN ---
                document.getElementById('btnConfirmarEliminar').addEventListener('click', function() {
                    const id = parseInt(document.getElementById('del_idmarca').value);
                    
                    alertify.confirm("Eliminar marca", "¿Realmente deseas eliminar de forma permanente esta marca?",
                        function(){ // Si presiona "Sí, eliminar"
                            marcas = marcas.filter(m => m.idmarca !== id);
                            guardarMarcas(marcas);
                            tabla.clear().rows.add(marcas).draw();
                            modalDelMarca.hide();
                            alertify.success("Marca eliminada correctamente");
                        },
                        function(){ // Si presiona "Cancelar"
                            modalDelMarca.hide();
                            alertify.error("Eliminación cancelada");
                        }
                    ).set('labels', {ok:'Sí, eliminar', cancel:'Cancelar'});
                });
            });
            //------------------------------------------------------------------------------
            function cargarTablaMarcas(){
                // Inicializar el DataTable
                tabla = new DataTable("#tabla_marcas", {
                        data: marcas,
                        columns: [
                            { data: 'idmarca', title: 'IdMarca' },
                            { data: 'marca', title: 'Marca' },
                            
                            {
                                data: null,
                                title: 'Acciones',
                                orderable: false,
                                searchable: false,
                                width: '12%',
                                render: function (data, type, row) {
                                return `
                                    <button class="btn btn-sm btn-warning me-1 btn-editar" 
                                    data-id="${row.idmarca}"><i class="bi bi-pencil-square"></i>
                                    </button>
                                    <button class="btn btn-sm btn-danger btn-eliminar" 
                                    data-id="${row.idmarca}"><i class="bi bi-trash">
                                    </i></button>
                                `;
                                }
                            }
                        ],
                        dom: 'Bfrtip',
                        buttons: [
                            {
                                extend: 'print',
                                text: '<i class="bi bi-printer"></i> Imprimir',
                                exportOptions: {
                                    columns: [0, 1]
                                },
                            },
                            {
                                extend: 'excelHtml5',
                                text: '<i class="bi bi-filetype-xlsx"></i> Exportar a Excel',
                                title: 'REPORTE DE MARCAS',
                                exportOptions: {
                                    columns: [0, 1]
                                },
                            },
                            {
                                extend: 'pdfHtml5',
                                text: '<i class="bi bi-filetype-pdf"></i> Exportar a PDF',
                                exportOptions: {
                                    columns: [0, 1] // Exporta solo el Id y la Marca (excluye acciones)
                                },
                                title: '', // Título vacío para que no estorbe a nuestro membrete
                                customize: function (doc) {
                                    // 1. Obtener fecha y hora
                                    const now = new Date();
                                    const fecha = now.toLocaleDateString('es-PY', { day: '2-digit', month: '2-digit', year: 'numeric' });
                                    const hora = now.toLocaleTimeString('es-PY', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });

                                    // 2. CREAR EL ENCABEZADO
                                    doc.content.splice(0, 0, {
                                        margin: [0, 0, 0, 12], 
                                        table: {
                                            widths: [100, '*', 'auto'], // 3 columnas: Logo, Centro, Derecha
                                            body: [
                                                [
                                                    // Columna Izquierda (Logo Texto)
                                                    { 
                                                        text: 'PUNTO\nELEGANCIA', 
                                                        fontSize: 14, 
                                                        bold: true, 
                                                        color: '#4e73df', 
                                                        alignment: 'center' 
                                                    },
                                                    // Columna Central (Títulos)
                                                    {
                                                        stack: [
                                                            { text: 'REPORTE DE MARCAS', fontSize: 16, bold: true },
                                                            { text: 'Venta de Ropa', fontSize: 10, color: '#666' },
                                                            { text: 'Belén, Concepción - Paraguay', fontSize: 10, color: '#666' }
                                                        ],
                                                        alignment: 'left',
                                                        margin: [10, 0, 0, 0]
                                                    },
                                                    // Columna Derecha (Datos del reporte)
                                                    {
                                                        stack: [
                                                            { text: 'INFORME DE MARCAS', fontSize: 12, bold: true, alignment: 'right' },
                                                            { text: 'Fecha: ' + fecha, fontSize: 10, alignment: 'right' },
                                                            { text: 'Hora: ' + hora, fontSize: 10, alignment: 'right' }
                                                        ]
                                                    }
                                                ]
                                            ]
                                        },
                                        layout: 'noBorders' 
                                    });

                                    // 3. ESTILIZAR LA TABLA DE DATOS (Líneas grises suaves)
                                    var objLayout = {};
                                    objLayout['hLineWidth'] = function(i) { return 0.5; };
                                    objLayout['vLineWidth'] = function(i) { return 0.5; };
                                    objLayout['hLineColor'] = function(i) { return '#aaaaaa'; };
                                    objLayout['vLineColor'] = function(i) { return '#aaaaaa'; };
                                    objLayout['paddingLeft'] = function(i) { return 4; };
                                    objLayout['paddingRight'] = function(i) { return 4; };
                                    doc.content[1].layout = objLayout; 

                                    // 4. AJUSTAR ANCHOS (2 COLUMNAS)
                                    if (doc.content[1].table !== undefined) {
                                        const tableNode = doc.content[1];
                                        if (tableNode.table.body && tableNode.table.body.length > 0) {
                                            // 'auto' para el ID, '*' para que el nombre de la Marca ocupe todo el espacio sobrante
                                            tableNode.table.widths = ['auto', '*'];
                                        }
                                    }

                                    // 5. PIE DE PÁGINA
                                    doc.footer = function(currentPage, pageCount) {
                                        return {
                                            columns: [
                                                {
                                                    alignment: 'left',
                                                    text: 'Impreso por: ' + (localStorage.getItem("nomUsuario") || 'Sistema'),
                                                    margin: [40, 10], 
                                                    fontSize: 8
                                                },
                                                {
                                                    alignment: 'right',
                                                    text: 'Pág. ' + currentPage.toString() + ' de ' + pageCount.toString(),
                                                    margin: [40, 10],
                                                    fontSize: 8
                                                }
                                            ]
                                        };
                                    };
                                }
                            },
                            {
                                text: '<i class="bi bi-file-earmark-plus"></i> Nueva marca',
                                className: 'btn btn-sm btn-primary',
                                action: function () {
                                    document.getElementById('formNuevaMarca').reset();
                                    // CORRECCIÓN: Llamamos a la variable correcta del modal de Marcas
                                    modalNMarca.show(); 
                                }
                            }
                        ],
                        responsive: true,
                        language: spanish,
                        initComplete: function () {
                            // Aplicar clases de Bootstrap a los botones
                            $('.dt-button:contains("Nueva marca")')
                                .removeClass('dt-button') // elimina estilo por defecto
                                .addClass('btn btn-sm btn-primary'); // agrega estilos Bootstrap

                            $('.dt-button:contains("Imprimir")')
                                .removeClass('dt-button')
                                .addClass('btn btn-sm btn-info');

                            $('.dt-button:contains("Exportar a Excel")')
                                .removeClass('dt-button')
                                .addClass('btn btn-sm btn-success');

                            $('.dt-button:contains("Exportar a PDF")')
                                .removeClass('dt-button')
                                .addClass('btn btn-sm btn-danger');
                        }
                });
                //tabla.column(5).visible(false); //Ocultar la columna contraseña
            }
            //------------------------------------------------------------------------------
            function guardarMarcas(data) {
                try {
                    localStorage.setItem('marcas', JSON.stringify(data));
                } catch (error) {
                    alertify.error('Error al guardar los datos');
                    console.error('Error al guardar:', error);
                }
            }
            //------------------------------------------------------------------------------
            function obtenerSiguienteId(marcas) {
                if (!marcas || marcas.length === 0) return 1;
                const maxId = Math.max(...marcas.map(c => c.idmarca || 0));
                return maxId + 1;
            }   
            //------------------------------------------------------------------------------
            
        </script>
</body>
</html>
