<!DOCTYPE html>
<html lang="es"> 
<head>
    <meta charset="UTF-8">
    <title>Reporte de Pagos | Punto Elegancia</title>
          <script src="js/seguridad.js"></script>
          <link rel="icon" type="image/png" href="img/working.png">
          <!-- ESTILOS DEL MENU -->
          <link href="menu/styles.css" rel="stylesheet" />
        
          <!-- BOOTSTRAP ICONS -->
          <link rel="stylesheet" href="bt-icons/bootstrap-icons.min.css">

          <!-- DATATABLES -->
          <link rel="stylesheet" href="dt/datatables.min.css">
          <link rel="stylesheet" href="dt/jquery.dataTables.min.css">
          <link rel="stylesheet" href="dt/buttons.dataTables.min.css">

          <!-- ALERTIFYJS -->
          <link rel="stylesheet" href="alert/alertify.min.css">
          <link rel="stylesheet" href="alert/themes/default.min.css">
          <script src="alert/alertify.min.js"></script>
</head>
<body class="sb-nav-fixed">

    <div id="contenedor-navbar"></div>
    <div id="layoutSidenav">
        <div id="contenedor-sidebar"></div>
         
        <div id="layoutSidenav_content">
            <main>
                <div class="container-fluid px-4">
                    <h1 class="mt-4">Reporte de Pagos a Proveedores</h1>
                    <ol class="breadcrumb mb-4">
                        <li class="breadcrumb-item"><a href="index.html">Inicio</a></li>
                        <li class="breadcrumb-item active">Historial de Egresos</li>
                    </ol>
                    
                    <div class="card mb-4 shadow-sm">
                        <div class="card-header bg-dark text-white">
                            <i class="bi bi-file-earmark-bar-graph me-1"></i> Historial de Pagos Realizados
                        </div>
                        <div class="card-body">
                            
                            <table id="tablaReportePagos" class="table table-bordered table-hover" style="width:100%">
                                <thead class="table-dark">
                                    <tr>
                                        <th>N° Pago</th>
                                        <th>Fecha (AAAA-MM-DD)</th>
                                        <th>Proveedor</th>
                                        <th>Método</th>
                                        <th>N° Recibo/Comprobante</th>
                                        <th>Monto Pagado</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    </tbody>
                                <tfoot>
                                    <tr class="bg-light fw-bold text-end">
                                        <td colspan="5">TOTAL GENERAL PAGADO:</td>
                                        <td id="totalReporte" class="text-danger fs-5">0 Gs.</td>
                                    </tr>
                                </tfoot>
                            </table>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

          <script src="js/seguridad.js"></script>
          <script src="js/funcionesSistema.js"></script>
          <!-- MENU -->
          <script src="menu/bootstrap.bundle.min.js"></script>
          <script src="menu/scripts.js"></script>
          <!-- DATATABLES -->
          <script src="dt/jquery-3.7.1.js"></script>
          <script src="dt/datatables.min.js"></script>
          <script src="dt/jquery.dataTables.min.js"></script>
          <!-- DATATABLES Buttons extension -->
          <script src="dt/dataTables.buttons.min.js"></script>
          <script src="dt/buttons.print.min.js"></script>
          <script src="dt/buttons.html5.min.js"></script>
          <!-- DATATABLES JSZip y pdfmake para exportar -->
          <script src="dt/jszip.min.js"></script>
          <script src="dt/pdfmake.min.js"></script>
          <script src="dt/vfs_fonts.js"></script>
          <!-- DATATABLES Idioma Español -->
          <script src="dt/es-ES.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            cargarComponentes(); 
            cargarReportePagos();
        });

        function cargarReportePagos() {
            let pagos = JSON.parse(localStorage.getItem("pagos_proveedores")) || [];
            let proveedores = JSON.parse(localStorage.getItem("proveedores")) || [];
            let totalGeneral = 0;

            let tabla = $('#tablaReportePagos').DataTable({
                language: spanish,
                dom: 'Bfrtip', // Habilita los botones de exportación
                buttons: [
                    {
                        extend: 'excelHtml5',
                        text: '<i class="bi bi-file-earmark-excel"></i> Excel',
                        className: 'btn btn-success btn-sm',
                        title: 'Reporte de Pagos a Proveedores'
                    },
                    {
                                extend: 'pdfHtml5',
                                text: '<i class="bi bi-filetype-pdf"></i> Exportar a PDF',
                                filename: 'Reporte de Pago Proveedor', 
                                exportOptions: {
                                    // Exportamos desde el índice 0 hasta el 5 (6 columnas en total)
                                    columns: [0, 1, 2, 3, 4, 5] 
                                },
                                title: '', 
                                customize: function (doc) {
                                    const now = new Date();
                                    const fecha = now.toLocaleDateString('es-PY', { day: '2-digit', month: '2-digit', year: 'numeric' });
                                    const hora = now.toLocaleTimeString('es-PY', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });

                                    // ENCABEZADO CORPORATIVO
                                    doc.content.splice(0, 0, {
                                        margin: [0, 0, 0, 12], 
                                        table: {
                                            widths: [100, '*', 'auto'], 
                                            body: [
                                                [
                                                    { 
                                                        text: 'PUNTO\nELEGANCIA', 
                                                        fontSize: 14, 
                                                        bold: true, 
                                                        color: '#4e73df', 
                                                        alignment: 'center' 
                                                    },
                                                    {
                                                        stack: [
                                                            { text: 'REPORTE PAGO PROVEEDORES', fontSize: 16, bold: true },
                                                            { text: 'Venta de Ropa', fontSize: 10, color: '#666' },
                                                            { text: 'Belén, Concepción - Paraguay', fontSize: 10, color: '#666' }
                                                        ],
                                                        alignment: 'left',
                                                        margin: [10, 0, 0, 0]
                                                    },
                                                    {
                                                        stack: [
                                                            { text: 'PAGO PROVEEDORES', fontSize: 12, bold: true, alignment: 'right' },
                                                            { text: 'Fecha: ' + fecha, fontSize: 10, alignment: 'right' },
                                                            { text: 'Hora: ' + hora, fontSize: 10, alignment: 'right' }
                                                        ]
                                                    }
                                                ]

                                            ]
                                        },
                                        layout: 'noBorders' 
                                    });

                                    // ESTILIZAR BORDES
                                    var objLayout = {};
                                    objLayout['hLineWidth'] = function(i) { return 0.5; };
                                    objLayout['vLineWidth'] = function(i) { return 0.5; };
                                    objLayout['hLineColor'] = function(i) { return '#aaaaaa'; };
                                    objLayout['vLineColor'] = function(i) { return '#aaaaaa'; };
                                    objLayout['paddingLeft'] = function(i) { return 4; };
                                    objLayout['paddingRight'] = function(i) { return 4; };
                                    doc.content[1].layout = objLayout; 

                                    // ASIGNAR 6 ANCHOS EXACTOS
                                    if (doc.content[1].table !== undefined) {
                                        const tableNode = doc.content[1];
                                        if (tableNode.table.body && tableNode.table.body.length > 0) {
                                            // 6 anchos en total.
                                            // Le damos '*' a Nombre (índice 2) y a Dirección (índice 4)
                                            tableNode.table.widths = ['auto', 'auto', '*', 'auto', '*', 'auto'];
                                        }
                                    }

                                    // PIE DE PÁGINA
                                    doc.footer = function(currentPage, pageCount) {
                                        return {
                                            columns: [
                                                {
                                                    alignment: 'left',
                                                    text: 'Impreso por: ' + (localStorage.getItem("nomUsuario") || 'Sistema'),
                                                    margin: [40, 10], 
                                                    fontSize: 8
                                                },
                                                {
                                                    alignment: 'right',
                                                    text: 'Pág. ' + currentPage.toString() + ' de ' + pageCount.toString(),
                                                    margin: [40, 10],
                                                    fontSize: 8
                                                }
                                            ]
                                        };
                                    };
                                }
                            },
                    {
                        extend: 'print',
                        text: '<i class="bi bi-printer"></i> Imprimir',
                        className: 'btn btn-secondary btn-sm',
                        title: 'Reporte de Pagos a Proveedores'
                    }
                ],
                columnDefs: [
                    { className: "text-center", targets: [0, 1, 3, 4] },
                    { className: "text-end fw-bold text-success", targets: [5] }
                ],
                order: [[0, 'desc']] // Ordena mostrando el pago más reciente primero
            });

            // Llenar la tabla
            pagos.forEach(p => {
                let prov = proveedores.find(pr => pr.idproveedor == p.idproveedor);
                let nomProv = prov ? prov.tabla_proveedores : "PROVEEDOR ELIMINADO";

                tabla.row.add([
                    p.idpago,
                    p.fecha_pago, // Mantiene la estructura de 4 dígitos para el año que definimos
                    nomProv,
                    p.metodo,
                    p.comprobante,
                    p.monto_total.toLocaleString('es-PY') + " Gs."
                ]);

                totalGeneral += p.monto_total;
            });

            // Dibujar la tabla
            tabla.draw();

            // Actualizar el pie de página con la sumatoria matemática
            document.getElementById('totalReporte').textContent = totalGeneral.toLocaleString('es-PY') + " Gs.";
        }
    </script>
</body>
</html>
